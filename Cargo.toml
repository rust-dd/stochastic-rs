[[bench]]
name = "poisson_process"
harness = false

[[bench]]
name = "mle"
harness = false

[[bench]]
name = "calendar"
harness = false

[[bench]]
name = "cashflows"
harness = false

[[bench]]
name = "market"
harness = false

[[bench]]
name = "instruments"
harness = false

[[bench]]
name = "credit"
harness = false

[[bench]]
name = "risk"
harness = false

[[bench]]
name = "realized"
harness = false

[[bench]]
name = "microstructure"
harness = false

[[bench]]
name = "factors"
harness = false
required-features = ["openblas"]

[[bench]]
name = "econometrics"
harness = false

[[bench]]
name = "filtering"
